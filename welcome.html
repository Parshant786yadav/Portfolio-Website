<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .welcome-container {
      text-align: center;
      visibility: hidden;
      width: min(92vw, 34rem);
      padding: 1.5rem 1rem;
      box-sizing: border-box;
    }

    .welcome-text {
      font-size: clamp(1.6rem, 4.5vw, 2.45rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.3;
      background: linear-gradient(to right, #00f5ff, #ff00cc);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      opacity: 0;
      transform: translate3d(-28px, 0, 0);
      display: inline-block;
      max-width: 100%;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .animate-slide-in {
      animation: slideInWelcome 1.05s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes slideInWelcome {
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    .sub-text {
      font-size: 1.1rem;
      color: #888;
      margin-top: 12px;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 1.5s;
    }

    .show-container {
      visibility: visible;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="welcome-container" id="welcomeContainer">
    <div id="welcomeMessage" class="welcome-text">...</div>
    
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <!-- Firebase Config -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCpNphBnKMbqRq8Z95z_60x1-mnbyaWGlA",
      authDomain: "myportfolioauth-41bbd.firebaseapp.com",
      projectId: "myportfolioauth-41bbd",
      storageBucket: "myportfolioauth-41bbd.appspot.com",
      messagingSenderId: "835152618447",
      appId: "1:835152618447:web:17d60e903b6a0ca6b7a8ba"
    };
    firebase.initializeApp(firebaseConfig);
  </script>

  <!-- Welcome Logic -->
  <script>
    function firstNameFromEmail(email) {
      if (!email) return 'Friend';
      var local = String(email).split('@')[0] || '';
      var letters = local.match(/^[a-zA-Z]+/);
      if (letters) {
        var s = letters[0];
        return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
      }
      var parts = local.split(/[._-]+/).filter(Boolean);
      for (var i = 0; i < parts.length; i++) {
        var m = parts[i].match(/[a-zA-Z]+/);
        if (m) {
          var t = m[0];
          return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
        }
      }
      if (local.length) return local.charAt(0).toUpperCase() + local.slice(1).toLowerCase();
      return 'Friend';
    }

    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        var msg = document.getElementById('welcomeMessage');
        var container = document.getElementById('welcomeContainer');
        var name = firstNameFromEmail(user.email);

        msg.textContent = 'Welcome, ' + name;
        container.classList.add('show-container');
        msg.classList.add('animate-slide-in');

        setTimeout(function () {
          window.location.href = 'dashboard.html';
        }, 3000);
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
